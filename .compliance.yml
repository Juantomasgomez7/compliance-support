# The AppSec-owned scope + severity map for the Compliance Support plugin.
# Defines which paths are in PCI scope (the cardholder-data environment) and the
# severity per check. The control definitions themselves live in the AppSec-owned
# control-library (skills/control-library/): SKILL.md for the two judgment controls,
# patterns.json for the two deterministic ones. Read by both hooks (scripts/scan.sh at
# write time, scripts/review_gate.sh at turn-end) and the agent (compliance-review).

scope:
  # Glob patterns for in-scope (PCI / cardholder-data) paths.
  include:
    - "examples/refunds-service/src/**"
  # Anything matching exclude is out of scope (e.g. dev tooling) and never flagged.
  exclude:
    - "**/scripts/**"

checks:
  hardcoded_secret:   { severity: block }    # hook   - deterministic (CTRL-1)
  weak_crypto_or_tls: { severity: block }    # hook   - deterministic (CTRL-2)
  pii_in_logs:        { severity: review }   # agent  - judgment      (CTRL-3)
  missing_audit_log:  { severity: review }   # agent  - judgment      (CTRL-4)
